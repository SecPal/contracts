name: Code Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  reuse:
    name: REUSE Compliance
    uses: SecPal/.github/.github/workflows/reusable-reuse.yml@main

  license-compatibility:
    name: License Compatibility
    uses: SecPal/.github/.github/workflows/reusable-license-compatibility.yml@main

  prettier:
    name: Prettier Formatting
    uses: ./.github/workflows/local-prettier.yml

  markdown-lint:
    name: Markdown Lint
    uses: SecPal/.github/.github/workflows/reusable-markdown-lint.yml@main

  copilot-instructions:
    name: Copilot Instructions
    uses: SecPal/.github/.github/workflows/reusable-copilot-instructions.yml@main

  openapi-lint:
    name: OpenAPI Lint
    uses: ./.github/workflows/local-openapi-lint.yml

  actionlint:
    name: Actionlint
    uses: SecPal/.github/.github/workflows/reusable-actionlint.yml@main
