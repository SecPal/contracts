---
name: Code Quality

# yamllint disable-line rule:truthy
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  reuse:
    name: REUSE Compliance
    # yamllint disable-line rule:line-length
    uses: SecPal/.github/.github/workflows/reusable-reuse.yml@3505a1da91e8b5cca4e34a024f1d35a7a792149e

  license-compatibility:
    name: License Compatibility
    # yamllint disable-line rule:line-length
    uses: SecPal/.github/.github/workflows/reusable-license-compatibility.yml@3505a1da91e8b5cca4e34a024f1d35a7a792149e

  prettier:
    name: Prettier Formatting
    uses: ./.github/workflows/local-prettier.yml

  markdown-lint:
    name: Markdown Lint
    # yamllint disable-line rule:line-length
    uses: SecPal/.github/.github/workflows/reusable-markdown-lint.yml@3505a1da91e8b5cca4e34a024f1d35a7a792149e
    with:
      # yamllint disable-line rule:line-length
      governance-ref: '6f8e13a7a62cee356811a7f58d6b92119941652f'

  ai-instructions:
    name: AI Instructions
    # yamllint disable-line rule:line-length
    uses: SecPal/.github/.github/workflows/reusable-ai-instructions.yml@3505a1da91e8b5cca4e34a024f1d35a7a792149e
    with:
      # yamllint disable-line rule:line-length
      governance-ref: '6f8e13a7a62cee356811a7f58d6b92119941652f'

  openapi-lint:
    name: OpenAPI Lint
    uses: ./.github/workflows/local-openapi-lint.yml

  actionlint:
    name: Actionlint
    # yamllint disable-line rule:line-length
    uses: SecPal/.github/.github/workflows/reusable-actionlint.yml@3505a1da91e8b5cca4e34a024f1d35a7a792149e
