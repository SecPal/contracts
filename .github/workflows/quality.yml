name: Code Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  reuse:
    name: REUSE Compliance
    uses: SecPal/.github/.github/workflows/reusable-reuse.yml@main

  license-compatibility:
    name: License Compatibility
    uses: SecPal/.github/.github/workflows/reusable-license-compatibility.yml@main

  prettier:
    name: Prettier Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier check
        run: npm run format:check

  markdown-lint:
    name: Markdown Lint
    uses: SecPal/.github/.github/workflows/reusable-markdown-lint.yml@main

  openapi-lint:
    name: OpenAPI Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate OpenAPI specification
        run: npm run lint

  actionlint:
    name: Actionlint
    uses: SecPal/.github/.github/workflows/reusable-actionlint.yml@main
