name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1" # Weekly on Mondays at 6:00 AM UTC

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --production

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  actions-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check for security issues in GitHub Actions
        run: |
          echo "Checking GitHub Actions workflows for security issues..."

          # Check for unpinned actions (should use commit SHA or specific version)
          # Exception: Allow @main for reusable workflows from SecPal organization (DRY principle)
          echo "Checking for unpinned actions..."
          if grep -r -E "uses:.*@main$|uses:.*@master$" .github/workflows/ 2>/dev/null | grep -v "SecPal/"; then
            echo "⚠️  Error: Found external actions using @main or @master branches"
            echo "External actions must be pinned to specific versions or commit SHAs for security"
            echo "Note: SecPal reusable workflows may use @main for DRY principle"
            exit 1
          else
            echo "✅ No unpinned external actions found"
          fi
