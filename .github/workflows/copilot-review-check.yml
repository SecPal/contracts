name: Copilot Review Enforcement
# SPDX-FileCopyrightText: 2025 SecPal Contributors
# SPDX-License-Identifier: AGPL-3.0-or-later

# DRY Phase 1b: This workflow calls the centralized reusable workflow
# See: SecPal/.github/.github/workflows/reusable-copilot-review.yml
# Refs: Lesson #18 (Copilot Review Enforcement System)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]

jobs:
  verify-copilot-review:
    name: Verify Copilot Review
    uses: SecPal/.github/.github/workflows/reusable-copilot-review.yml@main
    permissions:
      pull-requests: read
      checks: write
