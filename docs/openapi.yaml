  /me/notification-installations/{installationId}:
    put:
      summary: Register or Update My Notification Installation
      description: |
        Register or replace the authenticated notification installation's delivery credential and runtime metadata.

        The client chooses one stable `installationId` per notification-capable install context. Android callers use
        one identifier per app install. Browser callers use one identifier per notification-enabled browser
        profile/origin. Repeating this `PUT` for the same installation updates the channel credential, runtime
        metadata, or lifecycle state instead of creating a second registration row.

        This canonical authenticated surface is channel-aware. Callers send `channel: android_fcm` for the generic
        SecPal Android app and `channel: web_push` for browser Push API subscriptions.
      operationId: upsertMyNotificationInstallation
      tags:
        - Me
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      parameters:
        - name: installationId
          in: path
          required: true
          description: Stable client-generated installation identifier for one notification-capable install context.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationInstallationUpsertRequest'
            examples:
              androidFcmRegistered:
                summary: Android app registers a new FCM notification installation.
                value:
                  channel: android_fcm
                  installation_name: SM-G556B reception tablet
                  lifecycle_event: registered
                  runtime:
                    bootstrap_version: v1
                    schema_version: 3
                    metadata_revision: 3
                  registration:
                    push_token: 'e6pGmJq4Yk12:APA91bH8mP7rQ6sT5uV4wX3yZ2aBcDeFgHiJkLmNoPqRsTuVwXyZ1234567890abcdef'
                    app:
                      package_name: app.secpal
                      package_version_name: 1.5.0
                      package_version_code: 10500
                    device:
                      manufacturer: Samsung
                      model: SM-G556B
                      android_version: '16'
                      sdk_int: 36
              webPushRegistered:
                summary: Browser client registers a new Web Push notification installation.
                value:
                  channel: web_push
                  installation_name: Chrome workstation notifications
                  lifecycle_event: registered
                  runtime:
                    bootstrap_version: v1
                    schema_version: 3
                    metadata_revision: 5
                  registration:
                    browser:
                      browser_name: Chrome
                      browser_version: 136.0.7103.114
                      service_worker_scope: /
                    subscription:
                      endpoint: 'https://fcm.googleapis.com/fcm/send/cVJmVnB1c2g6MTIzNDU2Nzg5MA:APA91bHabcdefghijklmno1234567890'
                      expiration_time: 1782475200000
                      keys:
                        p256dh: 'BElx7P1qA2rS9tUvWxYz0123456789abcdefghijklmnopqrstuv'
                        auth: 'K7d9Lm2PqRs'
      responses:
        '200':
          description: Existing notification installation updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationInstallationResponse'
              examples:
                androidFcmCredentialRotated:
                  summary: Existing Android installation rotated its FCM token.
                  value:
                    data:
                      installation_id: 'a0b1c2d3-e4f5-4a67-89ab-0c1d2e3f4a5b'
                      channel: android_fcm
                      installation_name: SM-G556B reception tablet
                      credential_reference: 90abcdef
                      last_lifecycle_event: credential_rotated
                      registration:
                        app:
                          package_name: app.secpal
                          package_version_name: 1.5.0
                          package_version_code: 10500
                        device:
                          manufacturer: Samsung
                          model: SM-G556B
                          android_version: '16'
                          sdk_int: 36
                      runtime:
                        bootstrap_version: v1
                        schema_version: 3
                        metadata_revision: 3
                      created_at: '2026-05-23T11:30:00Z'
                      updated_at: '2026-05-23T11:45:00Z'
                webPushCredentialRotated:
                  summary: Existing browser installation refreshed its Web Push subscription.
                  value:
                    data:
                      installation_id: 'b1c2d3e4-f5a6-4789-8abc-1d2e3f4a5b6c'
                      channel: web_push
                      installation_name: Chrome workstation notifications
                      credential_reference: 7f3c9a12
                      last_lifecycle_event: credential_rotated
                      registration:
                        browser:
                          browser_name: Chrome
                          browser_version: 136.0.7103.114
                          service_worker_scope: /
                        subscription_endpoint_origin: 'https://fcm.googleapis.com'
                        subscription_expires_at: '2026-06-23T11:30:00Z'
                      runtime:
                        bootstrap_version: v1
                        schema_version: 3
                        metadata_revision: 5
                      created_at: '2026-05-23T14:15:00Z'
                      updated_at: '2026-05-23T14:25:00Z'
        '201':
          description: Notification installation created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationInstallationResponse'
              examples:
                androidFcmRegistered:
                  summary: New authenticated Android FCM notification installation created.
                  value:
                    data:
                      installation_id: 'a0b1c2d3-e4f5-4a67-89ab-0c1d2e3f4a5b'
                      channel: android_fcm
                      installation_name: SM-G556B reception tablet
                      credential_reference: 90abcdef
                      last_lifecycle_event: registered
                      registration:
                        app:
                          package_name: app.secpal
                          package_version_name: 1.5.0
                          package_version_code: 10500
                        device:
                          manufacturer: Samsung
                          model: SM-G556B
                          android_version: '16'
                          sdk_int: 36
                      runtime:
                        bootstrap_version: v1
                        schema_version: 3
                        metadata_revision: 3
                      created_at: '2026-05-23T11:30:00Z'
                      updated_at: '2026-05-23T11:30:00Z'
                webPushRegistered:
                  summary: New authenticated Web Push notification installation created.
                  value:
                    data:
                      installation_id: 'b1c2d3e4-f5a6-4789-8abc-1d2e3f4a5b6c'
                      channel: web_push
                      installation_name: Chrome workstation notifications
                      credential_reference: 7f3c9a12
                      last_lifecycle_event: registered
                      registration:
                        browser:
                          browser_name: Chrome
                          browser_version: 136.0.7103.114
                          service_worker_scope: /
                        subscription_endpoint_origin: 'https://fcm.googleapis.com'
                        subscription_expires_at: '2026-06-23T11:30:00Z'
                      runtime:
                        bootstrap_version: v1
                        schema_version: 3
                        metadata_revision: 5
                      created_at: '2026-05-23T14:15:00Z'
                      updated_at: '2026-05-23T14:15:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/NotificationInstallationConflict'
        '422':
          description: Validation Error - invalid notification installation payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblem'
              examples:
                invalidAndroidFcmToken:
                  summary: Android FCM token payload is malformed.
                  value:
                    message: The given data was invalid.
                    errors:
                      registration.push_token:
                        - The registration.push_token field must be at least 32 characters.
                invalidWebPushSubscription:
                  summary: Browser subscription payload is malformed.
                  value:
                    message: The given data was invalid.
                    errors:
                      registration.subscription.endpoint:
                        - The registration.subscription.endpoint field must be a valid URL.
                      registration.subscription.keys.p256dh:
                        - The registration.subscription.keys.p256dh field must be at least 16 characters.
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      summary: Revoke My Notification Installation
      description: |
        Revoke the authenticated notification installation's current delivery registration.

        This endpoint removes the server-side association for the selected `installationId`, for example during
        logout, app uninstall, browser sign-out, or explicit installation cleanup.
      operationId: revokeMyNotificationInstallation
      tags:
        - Me
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      parameters:
        - name: installationId
