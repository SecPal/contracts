          maxLength: 255
        house_number:
          type: [string, 'null']
          maxLength: 10
        postal_code:
          type: [string, 'null']
          maxLength: 20
        city:
          type: [string, 'null']
          maxLength: 255
        supplement:
          type: [string, 'null']
          maxLength: 255
        country:
          type: [string, 'null']
          minLength: 2
          maxLength: 2
          pattern: '^[A-Z]{2}$'
        resided_from:
          type: [string, 'null']
          format: date
        resided_until:
          type: [string, 'null']
          format: date

