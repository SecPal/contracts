      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateLanguagePreferenceRequest'
      responses:
        '200':
