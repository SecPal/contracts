            - $ref: '#/components/schemas/ApiTimestamp'
          description: Last update timestamp
          example: '2025-12-15T18:00:00Z'
        deleted_at:
          allOf:
            - $ref: '#/components/schemas/NullableApiTimestamp'
          description: Soft deletion timestamp
          example: null

    DuplicateResourceError:
      type: object
      additionalProperties: false
      description: Neutral duplicate response shared by all domain create operations so callers cannot infer which identifying value matched.
      required:
        - message
        - code
      properties:
        message:
          type: string
          enum:
            - A matching record already exists.
        code:
          type: string
          enum:
            - DUPLICATE_RESOURCE

  responses:
    BadRequest:
      description: Bad Request - Invalid input parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Invalid request parameters
            code: BAD_REQUEST

    Conflict:
      description: Conflict - Request cannot be completed in the current resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: The request cannot be completed in the current resource state.
            code: CONFLICT

    DuplicateConflict:
      description: Duplicate identification is evaluated atomically in the same transaction as the write. Every duplicate case returns this identical neutral payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DuplicateResourceError'
          example:
            message: A matching record already exists.
            code: DUPLICATE_RESOURCE

    OrganizationalUnitHasChildrenConflict:
      description: Conflict - Non-deleted direct child units must be moved or deleted first, regardless of their `is_active` values
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/OrganizationalUnitHasChildrenConflict'

    Unauthorized:
      description: Unauthorized - Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Unauthenticated.
            code: UNAUTHORIZED

    Forbidden:
      description: Forbidden - Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Insufficient permissions
            code: FORBIDDEN

    SimpleUnauthorized:
      description: Unauthenticated - Laravel returns a message-only JSON body without a `code` field.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SimpleMessageResponse'
          examples:
            unauthenticated:
              value:
                message: Unauthenticated.

    SimpleForbidden:
      description: Forbidden - middleware/policy failures may return a message-only JSON body without a `code` field.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SimpleMessageResponse'
          examples:
            forbidden:
              value:
                message: Invalid ability provided.

    NotFound:
      description: Not Found - Resource does not exist
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Resource not found
            code: NOT_FOUND

    ValidationError:
      description: Validation Error - Invalid input data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationProblem'

    OnboardingUploadMissingDocumentSubtype:
      description: Validation Error - Missing onboarding upload document subtype
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationProblem'
          examples:
            missingDocumentSubtype:
              summary: '`document_subtype` is required for identity-document uploads'
              value:
                message: 'The given data was invalid.'
                errors:
                  document_subtype:
                    - 'The document subtype field is required when document type is id_document.'

    UnprocessableEntity:
      description: Unprocessable Entity - Input validation or workflow preconditions failed
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/Error'
              - $ref: '#/components/schemas/ValidationProblem'
          example:
            message: Employee onboarding dossier must be complete before confirmation.
            code: UNPROCESSABLE_ENTITY

    TooManyRequests:
      description: Too Many Requests - Request throttled
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Too many attempts. Please try again later.
            code: TOO_MANY_REQUESTS

    SimpleTooManyRequests:
      description: Too Many Requests - Laravel throttle middleware returns a message-only JSON body without a `code` field.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SimpleMessageResponse'
          examples:
            throttled:
              value:
                message: Too Many Attempts.

    InternalServerError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: An internal error occurred
            code: INTERNAL_ERROR

    SimpleInternalServerError:
      description: Internal Server Error - Laravel returns a message-only JSON body without a `code` field.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SimpleMessageResponse'
          examples:
            internalServerError:
              value:
                message: Internal server error.

    AddressDataUnavailable:
      description: Address reference data not imported yet.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            message: Address reference data is not available yet.
            code: ADDRESS_DATA_UNAVAILABLE

    BootstrapStateInvalid:
      description: Internal Server Error - public bootstrap is enabled but deployment configuration is internally inconsistent.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BootstrapStateInvalidError'
          examples:
            missingRequiredBootstrapFields:
              summary: Deployment-local bootstrap metadata is enabled but incomplete.
              value:
                message: Public bootstrap configuration is incomplete for this deployment.
                code: BOOTSTRAP_STATE_INVALID
                details:
                  missing_fields:
                    - api_base_url
                    - instance.display_name
            missingAndroidFcmRuntimeMetadata:
              summary: Android FCM bootstrap is enabled but the public runtime metadata is incomplete.
              value:
                message: Public bootstrap configuration is incomplete for this deployment.
                code: BOOTSTRAP_STATE_INVALID
                details:
                  missing_fields:
                    - notification_channels.android_fcm.metadata_revision
                    - notification_channels.android_fcm.public_runtime_metadata.api_key
            missingWebPushRuntimeMetadata:
              summary: Web Push bootstrap is enabled but the public runtime metadata is incomplete.
              value:
                message: Public bootstrap configuration is incomplete for this deployment.
                code: BOOTSTRAP_STATE_INVALID
                details:
                  missing_fields:
                    - notification_channels.web_push.metadata_revision
                    - notification_channels.web_push.public_runtime_metadata.vapid_public_key

    NotificationInstallationConflict:
      description: Conflict - notification installation is unsupported for this deployment or the caller is using stale bootstrap metadata.
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/NotificationChannelUnsupportedError'
              - $ref: '#/components/schemas/NotificationRuntimeStateConflictError'
            discriminator:
              propertyName: code
              mapping:
                NOTIFICATION_CHANNEL_UNSUPPORTED: '#/components/schemas/NotificationChannelUnsupportedError'
                NOTIFICATION_RUNTIME_STATE_INVALID: '#/components/schemas/NotificationRuntimeStateConflictError'
          examples:
            unsupportedAndroidFcm:
              summary: Deployment does not expose authenticated Android FCM notification installations.
              value:
                message: This deployment does not accept authenticated notification installations for the requested channel.
                code: NOTIFICATION_CHANNEL_UNSUPPORTED
                details:
                  channel: android_fcm
                  retryable: false
            unsupportedWebPush:
              summary: Deployment does not expose authenticated Web Push notification installations.
              value:
                message: This deployment does not accept authenticated notification installations for the requested channel.
                code: NOTIFICATION_CHANNEL_UNSUPPORTED
                details:
                  channel: web_push
                  retryable: false
            staleAndroidFcmRuntime:
              summary: Android client must refresh bootstrap metadata before retrying.
              value:
                message: Notification runtime metadata changed; refresh bootstrap before retrying this installation update.
                code: NOTIFICATION_RUNTIME_STATE_INVALID
                details:
                  bootstrap_version: v1
                  schema_version: 3
                  channel: android_fcm
                  provided_metadata_revision: 2
                  expected_metadata_revision: 3
            staleWebPushRuntime:
              summary: Browser client must refresh bootstrap metadata before retrying.
              value:
                message: Notification runtime metadata changed; refresh bootstrap before retrying this installation update.
                code: NOTIFICATION_RUNTIME_STATE_INVALID
                details:
                  bootstrap_version: v1
                  schema_version: 3
                  channel: web_push
                  provided_metadata_revision: 4
                  expected_metadata_revision: 5

    UnsupportedClientVersion:
      description: Upgrade Required - client version is below the deployment minimum for login.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BootstrapUnsupportedClientVersionError'
          examples:
            androidTooOld:
              summary: Android app must upgrade before login may proceed.
              value:
                message: This SecPal deployment requires app version 1.4.0 (build 10400) or newer before login may proceed.
                code: UNSUPPORTED_CLIENT_VERSION
                details:
                  provided_app_version: 1.3.2
                  provided_app_build: 10302
                  minimum_supported_app_version: 1.4.0
                  minimum_supported_app_build: 10400
                  bootstrap_version: v1

    BootstrapConfigurationUnavailable:
      description: Service Unavailable - public bootstrap configuration cannot be served right now.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BootstrapConfigurationUnavailableError'
          examples:
            upstreamConfigurationReload:
              summary: Bootstrap metadata is temporarily unavailable during a runtime refresh.
              value:
                message: Public bootstrap configuration is temporarily unavailable.
                code: BOOTSTRAP_CONFIG_UNAVAILABLE
                details:
                  retryable: true
                  retry_after_seconds: 60

    ReleaseStateInvalid:
      description: Internal Server Error - public API release metadata is enabled but deployment configuration is internally inconsistent.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReleaseStateInvalidError'
          examples:
            missingRequiredReleaseFields:
              summary: Deployment-local API release metadata is enabled but incomplete.
              value:
                message: Public API release metadata is incomplete for this deployment.
                code: RELEASE_STATE_INVALID
                details:
                  missing_fields:
                    - api_release.version
                    - api_release.source_url

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum PAT
      description: |
        Laravel Sanctum personal access token authentication. Include the token in the Authorization header:
        `Authorization: Bearer <token>`
    SessionAuth:
      type: apiKey
      in: cookie
      name: laravel_session
      description: First-party browser session authentication for the SecPal SPA.
    CsrfToken:
      type: apiKey
      in: header
      name: X-XSRF-TOKEN
      description: Required on state-changing requests that use `SessionAuth`.

paths:
  /health:
    get:
      summary: Health Check
      description: Provides the health status of the API.
      operationId: getHealth
      tags:
        - Monitoring
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: Service Unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: Service temporarily unavailable
                code: SERVICE_UNAVAILABLE

  # =============================================================================
  # Address Reference Data
  # =============================================================================

  /addresses/de/streets:
    get:
      summary: Search German streets
      description: |
        Search the active German address reference dataset for street suggestions.

        At least one filter is required: `name` (2+ chars), `locality` (2+ chars), or `postal_code`.
        When no active import exists yet, the API responds with `503 ADDRESS_DATA_UNAVAILABLE`.
      operationId: searchGermanAddressStreets
      tags:
        - Addresses
      security:
        - BearerAuth: []
      parameters:
        - name: name
          in: query
          required: false
          description: Street-name prefix, minimum 2 characters.
          schema:
            type: string
            minLength: 2
            maxLength: 100
        - name: postal_code
          in: query
          required: false
          description: German postal-code prefix, 1 to 5 digits.
          schema:
            type: string
            pattern: '^\d{1,5}$'
        - name: locality
          in: query
          required: false
          description: Locality/city prefix, minimum 2 characters.
          schema:
            type: string
            minLength: 2
            maxLength: 100
        - name: limit
          in: query
          required: false
          description: Max number of suggestions to return.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: Street suggestions from the active import.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressStreetSuggestionResponse'
        '401':
          $ref: '#/components/responses/SimpleUnauthorized'
        '403':
          $ref: '#/components/responses/SimpleForbidden'
        '429':
          $ref: '#/components/responses/SimpleTooManyRequests'
        '422':
          $ref: '#/components/responses/ValidationError'
        '503':
          $ref: '#/components/responses/AddressDataUnavailable'
        '500':
          $ref: '#/components/responses/SimpleInternalServerError'

  /addresses/de/localities:
    get:
      summary: Search German localities
      description: |
        Search the active German address reference dataset for distinct `(postal_code, locality)` suggestions.

        At least one filter is required: `postal_code` or `locality` (2+ chars).
        When no active import exists yet, the API responds with `503 ADDRESS_DATA_UNAVAILABLE`.
      operationId: searchGermanAddressLocalities
      tags:
        - Addresses
      security:
        - BearerAuth: []
      parameters:
        - name: postal_code
          in: query
          required: false
          description: German postal-code prefix, 1 to 5 digits.
          schema:
            type: string
            pattern: '^\d{1,5}$'
        - name: locality
          in: query
          required: false
          description: Locality/city prefix, minimum 2 characters.
          schema:
            type: string
            minLength: 2
            maxLength: 100
        - name: limit
          in: query
          required: false
          description: Max number of distinct locality rows to return.
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: Distinct locality suggestions from the active import.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressLocalitySuggestionResponse'
        '401':
          $ref: '#/components/responses/SimpleUnauthorized'
        '403':
          $ref: '#/components/responses/SimpleForbidden'
        '429':
          $ref: '#/components/responses/SimpleTooManyRequests'
        '422':
          $ref: '#/components/responses/ValidationError'
        '503':
          $ref: '#/components/responses/AddressDataUnavailable'
        '500':
          $ref: '#/components/responses/SimpleInternalServerError'

  /addresses/de/status:
    get:
      summary: Get German address data import status
      description: |
        Returns metadata about the currently active German address reference import.

        When no active import exists yet, the API responds with `503 ADDRESS_DATA_UNAVAILABLE`.
      operationId: getGermanAddressDataStatus
      tags:
        - Addresses
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Active import metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressDataStatusResponse'
        '401':
          $ref: '#/components/responses/SimpleUnauthorized'
        '403':
          $ref: '#/components/responses/SimpleForbidden'
        '429':
          $ref: '#/components/responses/SimpleTooManyRequests'
        '503':
          $ref: '#/components/responses/AddressDataUnavailable'
        '500':
          $ref: '#/components/responses/SimpleInternalServerError'

  # =============================================================================
  # Authentication & Self-Service Endpoints
  # =============================================================================

  /auth/login:
    post:
      summary: Log In with Browser Session
      description: |
        Start a first-party browser session for the SecPal SPA.

        This endpoint is reserved for session-based login flows that completed the Sanctum CSRF/cookie bootstrap via `/sanctum/csrf-cookie`.
        Stateless API clients must use `/auth/token` instead.

        If the supplied credentials are valid for an MFA-enabled account, the API returns a pending login challenge instead of establishing the session immediately.
      operationId: loginWithSession
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionLoginRequest'
      responses:
        '200':
          description: Browser session established successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLoginResponse'
        '202':
          description: Primary credentials accepted, but MFA challenge verification is required before the session is established
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginMfaChallengeResponse'
        '400':
          description: Wrong login context for the endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                message: This endpoint requires a browser session context. Use /auth/token for API clients.
                code: BAD_REQUEST
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/token:
    post:
      summary: Create Bearer Token
      description: |
        Authenticate a non-browser client and return a Laravel Sanctum personal access token.

        Use this endpoint for Android, native, CLI, and integration clients. Browser SPAs should use `/auth/login` instead.

        If the supplied credentials are valid for an MFA-enabled account, the API returns a pending login challenge and issues no token until the challenge is verified.
      operationId: createAuthToken
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenLoginRequest'
      responses:
        '201':
          description: Bearer token created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenLoginResponse'
        '202':
          description: Primary credentials accepted, but MFA challenge verification is required before the token is issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginMfaChallengeResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/token/passkeys/challenges:
    post:
      summary: Start Token Passkey Sign-In Challenge
      description: |
        Create a native-client WebAuthn authentication challenge for passkey sign-in that will complete the bearer-token login flow.

        This endpoint is intended for Android and other native clients that complete the passkey ceremony outside the browser, such as with Credential Manager.

        Clients must provide `device_name` so the resulting personal access token can be labeled consistently with `/auth/token`. The endpoint is discoverable-only: it does not accept an email address or any other account-scoping hint, and the response never advertises an `allow_credentials` list. Native clients that cannot complete a discoverable passkey ceremony must fall back to `/auth/token` plus the existing phase-1 MFA challenge flow.

        Successful verification of this challenge returns a bearer token directly and does not emit a separate phase-1 TOTP challenge.
      operationId: createTokenPasskeyAuthenticationChallenge
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyTokenAuthenticationChallengeRequest'
      responses:
        '201':
          description: Token passkey sign-in challenge created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyAuthenticationChallengeResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/token/passkeys/challenges/{challengeId}/verify:
    post:
      summary: Verify Token Passkey Sign-In Challenge
      description: |
        Complete a token-mode passkey sign-in challenge after the caller already obtained WebAuthn assertion data from a native passkey provider.

        This flow is the phishing-resistant alternative to `/auth/token` for supported native clients. It does not consume or rotate phase-1 recovery codes, and it does not replace the `/auth/token` plus `/auth/mfa-challenges/{challengeId}/verify` flow for clients that still rely on passwords.
      operationId: verifyTokenPasskeyAuthenticationChallenge
      tags:
        - Authentication
      security: []
      parameters:
        - name: challengeId
          in: path
          required: true
          description: Passkey challenge identifier returned by `/auth/token/passkeys/challenges`.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticationVerificationRequest'
      responses:
        '200':
          description: Passkey sign-in verified and bearer token created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyTokenLoginResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/passkeys/challenges:
    post:
      summary: Start Browser Passkey Sign-In Challenge
      description: |
        Create a browser-session WebAuthn authentication challenge for passkey sign-in.

        This phase-2 endpoint is intended for browsers that support `PublicKeyCredential` and the WebAuthn ceremony APIs. Clients that do not support passkeys should continue to use `/auth/login` plus the existing phase-1 MFA challenge flow.

        The endpoint is discoverable-only: it does not accept an email address or any other account-scoping hint, and the response never advertises an `allow_credentials` list. Browsers that cannot complete a discoverable passkey ceremony must fall back to `/auth/login` plus the existing phase-1 MFA challenge flow.

        Successful verification of this challenge returns an authenticated browser-session context directly and does not emit a separate phase-1 TOTP challenge.
      operationId: createPasskeyAuthenticationChallenge
      tags:
        - Authentication
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticationChallengeRequest'
      responses:
        '201':
          description: Browser passkey sign-in challenge created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeyAuthenticationChallengeResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/passkeys/challenges/{challengeId}/verify:
    post:
      summary: Verify Browser Passkey Sign-In Challenge
      description: |
        Complete a browser-session passkey sign-in challenge after the caller already obtained WebAuthn assertion data from the browser.

        This flow is an alternative phishing-resistant sign-in path for supported browsers. It does not consume or rotate phase-1 recovery codes, and it does not replace the `/auth/login` plus `/auth/mfa-challenges/{challengeId}/verify` flow for non-passkey clients.
      operationId: verifyPasskeyAuthenticationChallenge
      tags:
        - Authentication
      security: []
      parameters:
        - name: challengeId
          in: path
          required: true
          description: Passkey challenge identifier returned by `/auth/passkeys/challenges`.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticationVerificationRequest'
      responses:
        '200':
          description: Passkey sign-in verified and browser session established successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasskeySessionLoginResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/mfa-challenges/{challengeId}/verify:
    post:
      summary: Verify Pending MFA Login Challenge
      description: |
        Complete a pending login challenge after the caller already passed the primary email/password step.

        No authenticated session or bearer token is issued until this verification succeeds. The challenge carries the original login context, so successful verification either finalizes the browser session or returns the pending personal access token.
      operationId: verifyLoginMfaChallenge
      tags:
        - Authentication
      security: []
      parameters:
        - name: challengeId
          in: path
          required: true
          description: MFA challenge identifier returned by `/auth/login` or `/auth/token`.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaVerificationCodeRequest'
      responses:
        '200':
          description: MFA challenge verified and the login flow completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompletedLoginResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/logout:
    post:
      summary: Log Out Current Session or Token
      description: |
        Canonical logout endpoint for authenticated clients.

        - Browser sessions use the current Sanctum session plus `X-XSRF-TOKEN`
        - Bearer-token clients revoke the current personal access token
      operationId: logoutCurrentAuthContext
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      responses:
        '200':
          description: Authenticated context logged out successfully
