  # =============================================================================
  # Onboarding Runtime Surface Endpoints (Issue #180)
  # =============================================================================

  /onboarding/validate-token:
    get:
      summary: Validate Onboarding Token
      description: |
        Public bootstrap endpoint. Confirms whether the one-time onboarding token from the
        invitation email is still usable before the employee opens the completion form.

        **Information-disclosure stance:** the response body is intentionally minimal and
        does NOT echo the invitee's first name, last name, or email. Anyone with the link
        can call this endpoint; we therefore avoid turning it into a data-leak primitive.
        The actual identity proof (name + date of birth) happens at
        `POST /onboarding/complete`.

        This endpoint is unauthenticated. Clients must present both the token and the
        invited email address. An invalid or expired token returns `422`. Repeated failed
        attempts are rate-limited; legitimate refreshes are not.
      operationId: validateOnboardingToken
      tags:
        - Onboarding
      security: []
      parameters:
        - name: token
          in: query
          required: true
          description: One-time onboarding token from the invitation email.
          schema:
            type: string
        - name: email
          in: query
          required: true
          description: Email address from the onboarding link.
          schema:
            type: string
            format: email
      responses:
        '200':
          description: |
            Token is valid for the supplied email. Body is intentionally information-poor;
            see `OnboardingTokenValidationResponse`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingTokenValidationResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /onboarding/complete:
    post:
      summary: Complete Onboarding Account Setup
      description: |
        Public bootstrap endpoint. Finalizes account bootstrap for an invited pre-contract
        employee: persists the verified name and password, marks the invitation token as
        completed, and establishes a browser session.

        **Identity proof:** in addition to the link contents (token + email) the caller
        must supply the invitee's `date_of_birth` and a `first_name`/`last_name` that match
        the HR record (an automatic similarity check tolerates typos and umlaut
        alternatives). Any identity-verification failure is reported with a single
        generic `422 { "message": "…" }` and no `errors` payload, so the response cannot
        be used as a per-field oracle. Each failed attempt is rate-limited and
        **permanently revokes the magic link** — see the request schema for the
        single-shot policy. Subsequent reuse of a revoked link returns the standard
        "invalid or expired" 422 response.
      operationId: completeOnboarding
      tags:
        - Onboarding
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingCompleteRequest'
      responses:
        '200':
          description: Onboarding bootstrap completed successfully and browser session established.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingCompleteResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: |
            Unprocessable — two distinct shapes are possible:
            - **Field-validation error** (invalid format, missing required field, future `date_of_birth`):
              body matches `ValidationProblem` (`message` + `errors` object). The magic
              link is preserved so the invitee can retry with a corrected payload.
            - **Identity-verification failure** (wrong date of birth, name too different,
              or reuse of a magic link that was already revoked by a previous failure):
              body is `{ "message": "…" }` only — no `errors` key — so the response
              cannot be used as a per-field oracle. **The magic link is permanently
              revoked on the first identity-verification failure**; further attempts
              with the same token return the standard "invalid or expired" message.
              Each request is also rate-limited.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ValidationProblem'
                  - $ref: '#/components/schemas/SimpleMessageResponse'
              examples:
                fieldValidation:
                  summary: Missing or malformed field
                  value:
                    message: The given data was invalid.
                    errors:
                      date_of_birth:
                        - The date of birth field must be a date before today.
                identityVerification:
                  summary: Identity-verification failure (DOB or name mismatch)
                  value:
                    message: We could not verify your identity with the details provided. For security reasons this onboarding link has been deactivated. Please contact HR for a new invitation.
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /onboarding/steps:
    get:
      summary: List Onboarding Steps
      description: |
        Returns the current onboarding progress block stored on the authenticated employee record.

        Requires the caller to be authenticated as the employee whose dossier is being accessed.
      operationId: getOnboardingSteps
      tags:
        - Onboarding
      security:
