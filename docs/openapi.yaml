  # =============================================================================
  # Employee Management
  # =============================================================================

  /employees:
    get:
      summary: List Employees
      description: Get paginated list of all employees in the tenant. Results can be filtered by the official employee lifecycle status as defined in the `EmployeeStatus` schema.
      operationId: listEmployees
      tags:
        - Employees
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          description: Number of items per page (max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
        - name: status
          in: query
          description: Filter employees by the official lifecycle status.
          schema:
            $ref: '#/components/schemas/EmployeeStatus'
      responses:
        '200':
          description: List of employees
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeCollectionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create Employee
      description: Create a new employee record. Onboarding invitations may only be requested during the `pre_contract` phase.
      operationId: createEmployee
      tags:
        - Employees
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeCreateRequest'
      responses:
        '201':
          description: Employee created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /employees/{employee}:
    get:
      summary: Get Employee
      description: Get a single employee by UUID
      operationId: getEmployee
      tags:
        - Employees
      security:
        - BearerAuth: []
      parameters:
        - name: employee
          in: path
          required: true
          description: Employee UUID identifier
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Employee details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Update Employee
      description: Update employee details (partial update)
      operationId: updateEmployee
      tags:
        - Employees
      security:
        - BearerAuth: []
      parameters:
        - name: employee
          in: path
          required: true
          description: Employee UUID identifier
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeUpdateRequest'
      responses:
        '200':
          description: Employee updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete Employee
      description: Soft delete an employee record
      operationId: deleteEmployee
      tags:
        - Employees
      security:
        - BearerAuth: []
      parameters:
        - name: employee
          in: path
          required: true
          description: Employee UUID identifier
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Employee deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # =============================================================================
  # Customer Management Endpoints (Epic #210, Phase 5)
  # =============================================================================

  /customers:
    get:
      summary: List Customers
      description: |
        Retrieve a paginated list of customers with optional filtering.
        Users only see customers they have access to (via assignments or organizational scope).
      operationId: listCustomers
      tags:
        - Customers
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
          description: Items per page
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: Search in name and customer_number
        - name: is_active
          in: query
          required: false
          schema:
            type: boolean
          description: Filter by active status
      responses:
        '200':
          description: Customers retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Customer'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create Customer
      description: |
        Create a new customer. Customer number is auto-generated (KD-YYYY-####).
        Requires customers.create permission.
      operationId: createCustomer
      tags:
        - Customers
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - billing_address
              properties:
                name:
                  type: string
                  maxLength: 255
                  example: 'ACME Corporation GmbH'
                billing_address:
                  $ref: '#/components/schemas/Address'
                contact:
                  $ref: '#/components/schemas/Contact'
                notes:
                  type: string
                  example: 'VIP customer'
                metadata:
                  type: object
                  additionalProperties: true
                  example: { 'industry': 'retail' }
      responses:
        '201':
          description: Customer created successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /customers/{customer}:
    get:
      summary: Get Customer
      description: |
        Retrieve a single customer by ID with optional relationships.
        Requires view access via assignment or organizational scope.
      operationId: getCustomer
      tags:
        - Customers
      security:
        - BearerAuth: []
      parameters:
        - name: customer
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Customer UUID
        - name: include
          in: query
          required: false
          schema:
            type: string
            enum: [sites, assignments, sites.assignments]
          description: Comma-separated list of relationships to include
      responses:
        '200':
          description: Customer retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Customer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Update Customer
      description: |
        Update customer fields (PATCH semantics - all fields optional).
        Requires customers.update permission and view access to customer.
      operationId: updateCustomer
      tags:
        - Customers
      security:
        - BearerAuth: []
      parameters:
        - name: customer
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Customer UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                billing_address:
                  $ref: '#/components/schemas/Address'
                contact:
                  $ref: '#/components/schemas/Contact'
                is_active:
                  type: boolean
                notes:
                  type: string
                metadata:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Customer updated successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/Customer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete Customer
      description: |
        Soft delete a customer. Requires customers.delete permission.
        Will fail if customer has active sites.
      operationId: deleteCustomer
      tags:
        - Customers
      security:
        - BearerAuth: []
      parameters:
        - name: customer
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Customer UUID
      responses:
        '204':
          description: Customer deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Cannot delete customer with active sites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /customers/{customer}/sites:
    get:
      summary: List Customer Sites
      description: |
        Retrieve all sites belonging to a specific customer.
        Paginated with same filters as /sites endpoint.
      operationId: listCustomerSites
      tags:
        - Customers
        - Sites
      security:
        - BearerAuth: []
      parameters:
        - name: customer
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Customer UUID
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [permanent, temporary]
          description: Filter by site type
        - name: is_active
          in: query
          required: false
          schema:
            type: boolean
          description: Filter by active status
      responses:
        '200':
          description: Sites retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Site'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # =============================================================================
  # Site Management Endpoints (Epic #210, Phase 5)
  # =============================================================================

  /sites:
    get:
      summary: List Sites
      description: |
        Retrieve a paginated list of sites with comprehensive filtering.
        Users see sites via organizational unit access, direct assignment, or customer assignment.
      operationId: listSites
      tags:
        - Sites
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
          description: Search in name, site_number, customer name
        - name: customer_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by customer
        - name: organizational_unit_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by organizational unit
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [permanent, temporary]
          description: Filter by site type
        - name: is_active
          in: query
          required: false
          schema:
            type: boolean
          description: Filter by active status
        - name: currently_valid
          in: query
          required: false
          schema:
            type: boolean
          description: Filter by current validity (for temporary sites)
      responses:
        '200':
          description: Sites retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                  - meta
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Site'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create Site
      description: |
        Create a new site. Site number is auto-generated (OBJ-YYYY-####).
        Requires sites.create permission and access to organizational unit.
      operationId: createSite
      tags:
        - Sites
      security:
        - BearerAuth: []
