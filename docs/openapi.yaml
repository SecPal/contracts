  /auth/logout-all:
    post:
      summary: Revoke All Personal Access Tokens
      description: Revoke every Laravel Sanctum personal access token for the authenticated user.
      operationId: logoutAllDevices
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      responses:
        '200':
          description: All personal access tokens revoked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/email/verification-notification:
    post:
      summary: Resend Email Verification
      description: |
        Queue a fresh Laravel email verification notification for the authenticated caller.

        **Authentication:** Requires an authenticated Sanctum principal (`auth:sanctum`) with the `api-access`
        ability for personal access tokens (tokens from `/auth/token` include this ability). Browser SPAs use the
        first-party cookie session (`SessionAuth`) plus `X-XSRF-TOKEN` on mutating requests; native and CLI clients
        send `Authorization: Bearer <token>` (`BearerAuth`).

        **Rate limiting:** This route applies Laravel `throttle:6,1` (six requests per rolling minute per throttle
        key). When exceeded, the framework returns HTTP 429 with a JSON body containing only `message`
        (`Too Many Attempts.`), without the structured `code` field used elsewhere.

        **Responses:** HTTP 202 means the notification was queued; HTTP 200 means the address was already verified
        and no mail was sent.
      operationId: sendEmailVerificationNotification
      tags:
        - Authentication
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      responses:
        '200':
          description: Email address was already verified; no notification was queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
              examples:
                alreadyVerified:
                  summary: Already verified
                  value:
                    message: Email address is already verified.
        '202':
          description: Verification email notification was queued for delivery.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
              examples:
                queued:
                  summary: Verification mail queued
                  value:
                    message: Verification link sent successfully.
        '401':
          $ref: '#/components/responses/SimpleUnauthorized'
        '429':
          $ref: '#/components/responses/SimpleTooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /me:
    get:
      summary: Get Current User
      description: |
        Canonical self-service endpoint for the authenticated caller.

        This endpoint is the supported way to retrieve the caller's profile and authorization context. Similar guessed aliases such as `/auth/me`, `/user`, `/user/profile`, and `/profile` are intentionally undefined.
      operationId: getCurrentUser
      tags:
        - Me
      security:
        - BearerAuth: []
        - SessionAuth: []
      responses:
        '200':
          description: Authenticated user returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatedUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

