                        previous_hash: 7f83b1657ff1fc53b92dc18148a1d65dfa1350146f1fcb4f6e8f7d28e17f72d2
                        merkle_root: eeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeeee
                        merkle_batch_id: 1742217300
                        ots_confirmed_at: null
                        is_orphaned_genesis: false
                        orphaned_reason: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Forbidden - Activity outside organizational scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                organizationalScope:
                  summary: Activity outside user's organizational scope
                  value:
                    message: This action is unauthorized due to organizational scope restrictions.
                    code: FORBIDDEN
                    details:
                      reason: organizational_scope_violation
                      message: >-
                        You do not have access to verify this activity log.
                        It belongs to an organizational unit outside your scope.
        '404':
