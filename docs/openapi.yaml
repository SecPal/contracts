    EmployeeAddress:
      type: object
      description: |
        Residential address row (`employee_addresses`). Exactly one row per employee may omit `resided_until`,
        indicating the current residence. Responses decrypt sensitive street/postal/city fields into plaintext keys.
      required:
        - id
      properties:
        id:
          type: string
          format: uuid
        street:
          type: [string, 'null']
          description: Decrypted (stored encrypted at rest).
          maxLength: 255
        house_number:
          type: [string, 'null']
          description: Decrypted (stored encrypted at rest).
          maxLength: 10
        postal_code:
          type: [string, 'null']
          description: Decrypted (stored encrypted at rest).
          maxLength: 20
        city:
          type: [string, 'null']
          description: Decrypted (stored encrypted at rest).
          maxLength: 255
        supplement:
          type: [string, 'null']
          description: Decrypted (stored encrypted at rest).
          maxLength: 255
        country:
          type: [string, 'null']
          minLength: 2
          maxLength: 2
          pattern: '^[A-Z]{2}$'
        resided_from:
          type: [string, 'null']
          format: date
        resided_until:
          type: [string, 'null']
          format: date
          description: Null means this row is the employee's current address.

    EmployeeAddressInput:
      type: object
      description: |
        Address row for create/update payloads (no `id`; server assigns identifiers). Sending `addresses` replaces stored rows for that employee.
