                  value:
                    data:
                      installation_id: 'a0b1c2d3-e4f5-4a67-89ab-0c1d2e3f4a5b'
                      channel: android_fcm
                      revoked_at: '2026-05-23T12:00:00Z'
                webPushRevoked:
                  summary: Web Push installation registration removed.
                  value:
                    data:
                      installation_id: 'b1c2d3e4-f5a6-4789-8abc-1d2e3f4a5b6c'
                      channel: web_push
                      revoked_at: '2026-05-23T12:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

