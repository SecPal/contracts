  /android/bootstrap/exchange:
    post:
      summary: Exchange Android Bootstrap Token
      description: |
        Public bootstrap endpoint for the managed Android app after Device Owner provisioning hands control to SecPal.

        The Android client presents the short-lived bootstrap token from the private QR payload exactly once and receives tenant-scoped bootstrap configuration, including managed policy flags and the release-metadata URL for its configured non-Play channel.
      operationId: exchangeAndroidBootstrapToken
      tags:
        - Android Provisioning
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AndroidBootstrapExchangeRequest'
      responses:
        '200':
          description: Bootstrap token exchanged successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AndroidBootstrapExchangeResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bootstrap:
    get:
      summary: Get Public Bootstrap Configuration
      description: |
        Returns the canonical public pre-login runtime-discovery document for SecPal clients on this deployment.

        Clients use this response to discover the canonical API base URL, deployment display metadata,
        bootstrap/schema version information, minimum supported app version, pre-login feature flags, and optional
        per-channel notification runtime metadata before any login attempt.

        Android callers request this surface with `client_platform=android` and send `app_version` plus
        `app_build` so the deployment can reject unsupported native runtimes deterministically. Browser callers
        request the same surface with `client_platform=browser` to fetch Web Push public runtime metadata before
        login or subscription refresh and omit the Android-specific version parameters.

        The response contains only public deployment metadata. It never exposes tenant-personalized values, private
        notification delivery credentials, registration secrets, or server secrets.

        Android clients must send their current app version so the deployment can reject unsupported runtimes
        deterministically instead of relying on undocumented fallback behavior.

        Under SecPal's current `0.x` policy, obsolete bootstrap/mobile fields are not preserved for compatibility.
        Clients must consume this canonical `v1` response shape and should not assume aliases or fallback keys survive.
      operationId: getBootstrapConfiguration
      tags:
        - Bootstrap
      security: []
      parameters:
        - name: client_platform
          in: query
          required: true
          description: Pre-login client platform requesting the bootstrap document. Use `android` for native-app bootstrap and `browser` for Web Push-capable browser bootstrap.
          schema:
            $ref: '#/components/schemas/BootstrapClientPlatform'
        - name: app_version
          in: query
          required: false
          description: Required when `client_platform=android`. SecPal Android app version name currently running on the client. Browser callers omit this parameter.
          schema:
            type: string
            maxLength: 50
            example: 1.4.0
        - name: app_build
          in: query
          required: false
          description: Required when `client_platform=android`. SecPal Android version code currently running on the client. Browser callers omit this parameter.
          schema:
            type: integer
            minimum: 1
            example: 10400
      responses:
        '200':
          description: Public bootstrap configuration returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BootstrapResponse'
              examples:
                supportedAndroidClient:
                  summary: Supported Android client receives the canonical bootstrap document with channel-aware notification metadata.
                  value:
                    data:
                      client_platform: android
                      api_base_url: 'https://api.secpal.dev/v1'
                      instance:
                        display_name: SecPal Demo
                      compatibility:
                        bootstrap_version: v1
                        schema_version: 3
                        minimum_supported_app_version: 1.4.0
                        minimum_supported_app_build: 10400
                      features:
                        password_login: true
                        passkey_login: true
                        managed_android_enrollment: true
                        notification_channels:
                          android_fcm: true
                          web_push: true
                      notification_channels:
                        android_fcm:
                          channel: android_fcm
                          metadata_revision: 3
                          public_runtime_metadata:
                            api_key: 'public-client-api-key-demo-1234567890'
                            project_id: secpal-demo-push
                            application_id: '1:1234567890:android:abcdef1234567890'
                            sender_id: '1234567890'
                        web_push:
                          channel: web_push
                          metadata_revision: 5
                          public_runtime_metadata:
                            vapid_public_key: 'BE9tfo-aCxwtPk9QYXKDlAUGBwgJCgsMDQ4PEBESExQVobLD1OX2BxgpMEFSY3SFlgcYKTBLXG1-j5ABAgMEBQY'
                supportedBrowserClient:
                  summary: Supported browser client receives the same canonical bootstrap document for Web Push runtime bootstrap.
                  value:
                    data:
                      client_platform: browser
                      api_base_url: 'https://api.secpal.dev/v1'
                      instance:
                        display_name: SecPal Demo
                      compatibility:
                        bootstrap_version: v1
                        schema_version: 3
                        minimum_supported_app_version: 1.4.0
                        minimum_supported_app_build: 10400
                      features:
                        password_login: true
                        passkey_login: true
                        managed_android_enrollment: true
                        notification_channels:
                          android_fcm: true
                          web_push: true
                      notification_channels:
                        android_fcm:
                          channel: android_fcm
                          metadata_revision: 3
                          public_runtime_metadata:
                            api_key: 'public-client-api-key-demo-1234567890'
                            project_id: secpal-demo-push
                            application_id: '1:1234567890:android:abcdef1234567890'
                            sender_id: '1234567890'
                        web_push:
                          channel: web_push
                          metadata_revision: 5
                          public_runtime_metadata:
                            vapid_public_key: 'BE9tfo-aCxwtPk9QYXKDlAUGBwgJCgsMDQ4PEBESExQVobLD1OX2BxgpMEFSY3SFlgcYKTBLXG1-j5ABAgMEBQY'
        '422':
          $ref: '#/components/responses/ValidationError'
        '426':
          $ref: '#/components/responses/UnsupportedClientVersion'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/BootstrapStateInvalid'
        '503':
          $ref: '#/components/responses/BootstrapConfigurationUnavailable'

  /release:
    get:
      summary: Get Public API Release Metadata
      description: |
        Returns the narrow public release-metadata document for the currently deployed SecPal API instance.

        Clients use this endpoint to identify the active API release and retrieve the immutable corresponding-source
        archive URL for that exact backend release. The response intentionally stays smaller than `GET /bootstrap`
        and does not expose deployment display names, feature flags, schema negotiation data, or broader diagnostics.

        Under SecPal's current `0.x` policy, clients must consume this canonical response shape and should not assume
        undocumented aliases, fallback keys, or extra release metadata fields survive.

        **Rate limiting:** This route uses the shared `source-offer` throttle bucket. When exceeded, Laravel returns
        HTTP 429 with a JSON body that contains only `message`, not the richer reusable `Error` shape.
      operationId: getPublicApiRelease
      tags:
        - Bootstrap
      security: []
      responses:
        '200':
          description: Public API release metadata returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiReleaseResponse'
              examples:
                deployedApiRelease:
                  summary: Public client receives the active API release identifier and immutable corresponding-source URL.
                  value:
                    data:
                      version: api-2026-07-03
                      source_url: 'https://github.com/SecPal/api/releases/download/api-2026-07-03/source.tar.gz'
        '429':
          $ref: '#/components/responses/SimpleTooManyRequests'
        '500':
          $ref: '#/components/responses/ReleaseStateInvalid'

  /android/channels/{channel}/latest.json:
    get:
      summary: Get Latest Android Release Metadata
      description: |
        Returns the stable latest release metadata contract for a non-Play Android distribution channel.

        Play Store updates remain store-native and are intentionally not represented by this endpoint.
      operationId: getLatestAndroidReleaseMetadata
