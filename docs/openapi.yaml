  # =============================================================================
  # Onboarding Runtime Surface Endpoints (Issue #180)
  # =============================================================================

  /onboarding/validate-token:
    get:
      summary: Validate Onboarding Token
      description: |
        Public bootstrap endpoint. Validates the one-time onboarding token that was delivered
        in the invitation email before the employee creates their account.

        This endpoint is unauthenticated. Clients must present both the token and the invited email address.
        An invalid or expired token returns `422`.
      operationId: validateOnboardingToken
      tags:
        - Onboarding
      security: []
      parameters:
        - name: token
          in: query
          required: true
          description: One-time onboarding token from the invitation email.
          schema:
            type: string
        - name: email
          in: query
          required: true
          description: Email address from the onboarding link.
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Token is valid; returns minimal employee bootstrap data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingTokenValidationResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /onboarding/complete:
    post:
      summary: Complete Onboarding Account Setup
      description: |
        Public bootstrap endpoint. Finalizes account bootstrap for an invited pre-contract employee,
        persists the supplied name and password, marks the invitation token as completed,
        and establishes a browser session.

        The caller must present a valid onboarding token and the invited email address.
      operationId: completeOnboarding
      tags:
        - Onboarding
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingCompleteRequest'
      responses:
        '200':
          description: Onboarding bootstrap completed successfully and browser session established.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingCompleteResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /onboarding/steps:
    get:
      summary: List Onboarding Steps
      description: |
        Returns the current onboarding progress block stored on the authenticated employee record.

        Requires the caller to be authenticated as the employee whose dossier is being accessed.
      operationId: getOnboardingSteps
      tags:
        - Onboarding
      security:
        - BearerAuth: []
        - SessionAuth: []
      responses:
        '200':
          description: Current onboarding progress returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingStepsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /onboarding/templates:
    get:
      summary: List Onboarding Form Templates
      description: |
        Returns the available onboarding form templates for the authenticated pre-contract employee.

        The runtime currently exposes templates under `/onboarding/templates`; a separate frontend route-drift follow-up tracks any naming convergence.
      operationId: listOnboardingTemplates
      tags:
        - Onboarding
      security:
        - BearerAuth: []
        - SessionAuth: []
      responses:
        '200':
          description: Onboarding templates retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingFormTemplateCollectionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /onboarding/templates/{template}:
    get:
      summary: Get Onboarding Form Template
      description: |
        Returns the form template definition for a specific onboarding step, including the
        `form_schema` JSON Schema used to render the dynamic form in the frontend.
      operationId: getOnboardingFormTemplate
      tags:
        - Onboarding
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: template
          in: path
          required: true
          description: Form template UUID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Form template retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingFormTemplateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /onboarding/submissions:
    get:
      summary: List Onboarding Submissions
      description: |
        Returns all form submissions for the authenticated employee's onboarding dossier,
        optionally with embedded template and reviewer resources.
      operationId: listOnboardingSubmissions
      tags:
        - Onboarding
      security:
        - BearerAuth: []
        - SessionAuth: []
      responses:
        '200':
          description: Onboarding submission list retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingSubmissionCollection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create Onboarding Submission
      description: |
        Creates a new onboarding form submission for the given template.

        Pre-contract employees with an active onboarding workflow may submit a new draft or
        directly submit for HR review.

        To update an existing draft or rejected submission, use
        `PATCH /onboarding/submissions/{submission}`.
      operationId: createOnboardingSubmission
      tags:
        - Onboarding
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingSubmissionUpsertRequest'
      responses:
        '200':
          description: Existing draft or rejected submission updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingFormSubmissionResponse'
        '201':
          description: Submission draft created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingFormSubmissionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /onboarding/submissions/{submission}:
    patch:
      summary: Update Onboarding Submission
      description: |
        Updates an existing editable onboarding form submission owned by the authenticated pre-contract employee.

        Only submissions in `draft` or `rejected` status may be edited. A successful update may keep the
        submission in `draft` or transition it to `submitted` for HR review.
      operationId: updateOnboardingSubmission
      tags:
        - Onboarding
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      parameters:
        - name: submission
          in: path
          required: true
          description: Submission UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingSubmissionPatchRequest'
      responses:
        '200':
          description: Onboarding submission updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingFormSubmissionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict - Submission is no longer editable in its current review state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                submittedAwaitingReview:
                  summary: Submission already awaiting HR review
                  value:
                    message: Form has already been submitted and is awaiting review
                    code: CONFLICT
                approvedAlreadyReviewed:
                  summary: Submission already approved by HR
                  value:
                    message: Form has already been reviewed and approved
                    code: CONFLICT
        '422':
          description: Validation Error - Update payload invalid or onboarding workflow state disallows the change
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationProblem'
              examples:
                missingEditablePayload:
                  summary: Neither editable field provided
                  value:
                    message: The given data was invalid.
                    errors:
                      form_data:
                        - The form data field is required when status is not present.
                      status:
                        - The status field is required when form data is not present.
                invalidWorkflowState:
                  summary: Employee workflow not in a state that allows submission
                  value:
                    message: The given data was invalid.
                    errors:
                      onboarding_workflow_status:
                        - 'Cannot submit: onboarding workflow is not in an expected state for this action'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /onboarding/completion-status:
    get:
      summary: Get Onboarding Completion Status
      description: |
        Returns the current required-template completion status for the authenticated employee.
      operationId: getOnboardingCompletionStatus
      tags:
        - Onboarding
      security:
        - BearerAuth: []
        - SessionAuth: []
      responses:
        '200':
          description: Onboarding completion status returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingCompletionStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /onboarding/submissions/{submission}/files:
    post:
      summary: Upload Onboarding Submission Attachment
      description: Upload a binary attachment for an existing onboarding form submission owned by the authenticated pre-contract employee.
      operationId: uploadOnboardingSubmissionFile
      tags:
        - Onboarding
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      parameters:
        - name: submission
          in: path
          required: true
          description: Submission UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadOnboardingSubmissionFileRequest'
      responses:
        '201':
          description: Onboarding submission attachment uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingSubmissionFileUploadResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/onboarding/submissions/{submission}/approve:
    post:
      summary: Approve Onboarding Submission
      description: |
        HR review action. Approves a submitted onboarding form submission, transitioning
        its status to `approved`.

        Requires an HR or admin role. Only submissions in `submitted` status may be approved.
      operationId: approveOnboardingSubmission
      tags:
        - Onboarding
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      parameters:
        - name: submission
          in: path
          required: true
          description: Submission UUID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Submission approved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingFormSubmissionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/onboarding/submissions/{submission}/reject:
    post:
      summary: Reject Onboarding Submission
      description: |
        HR review action. Rejects a submitted onboarding form submission and requests changes,
        transitioning its status to `rejected`.

        Requires an HR or admin role. Only submissions in `submitted` status may be rejected.
      operationId: rejectOnboardingSubmission
      tags:
        - Onboarding
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      parameters:
        - name: submission
          in: path
          required: true
          description: Submission UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingSubmissionRejectRequest'
      responses:
        '200':
          description: Submission rejected and changes requested from the employee.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingFormSubmissionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/onboarding/employees/{employee}/confirm:
    post:
      summary: Confirm Onboarding Dossier And Contract State
      description: |
        Perform the explicit HR/compliance confirmation step for a pre-contract employee after dossier review.

        This action advances the employee workflow to `contract_confirmed` and may immediately promote the workflow to `ready_for_activation` when the contract start date gate is already satisfied.
      operationId: confirmEmployeeOnboarding
      tags:
        - Onboarding
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      parameters:
        - name: employee
          in: path
          required: true
          description: Employee UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingConfirmationRequest'
      responses:
        '200':
          description: Employee onboarding dossier confirmed successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # =============================================================================
  # Android Enrollment & Distribution Endpoints (Issue #183)
  # =============================================================================

  /admin/android-enrollment-sessions:
    get:
      summary: List Android Enrollment Sessions
      description: |
        Returns paginated Android enrollment sessions for the authenticated tenant.

        The list includes active and historical sessions for audit visibility, but never returns the raw bootstrap token after creation.
      operationId: listAndroidEnrollmentSessions
      tags:
        - Android Provisioning
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination.
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          required: false
          description: Number of items per page (max 100).
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
        - name: status
          in: query
          required: false
          description: Filter sessions by lifecycle state.
          schema:
            $ref: '#/components/schemas/AndroidEnrollmentSessionStatus'
      responses:
        '200':
          description: Android enrollment sessions returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AndroidEnrollmentSessionCollectionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create Android Enrollment Session
      description: |
        Creates a short-lived Android enrollment session and returns the minimal provisioning payload that authorized SecPal users can encode as a private QR code.

        The bootstrap token is returned only at creation time through the provisioning payload and must not be exposed again by list or read endpoints.
      operationId: createAndroidEnrollmentSession
      tags:
        - Android Provisioning
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AndroidEnrollmentSessionCreateRequest'
      responses:
        '201':
          description: Android enrollment session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AndroidEnrollmentSessionCreateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/android-enrollment-sessions/{session}:
    get:
      summary: Get Android Enrollment Session
      description: Returns one Android enrollment session without exposing the raw bootstrap token.
      operationId: getAndroidEnrollmentSession
      tags:
        - Android Provisioning
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: session
          in: path
          required: true
          description: Android enrollment session UUID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Android enrollment session returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AndroidEnrollmentSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/android-enrollment-sessions/{session}/revoke:
    post:
      summary: Revoke Android Enrollment Session
      description: |
        Revokes a pending Android enrollment session before the bootstrap token is exchanged.

        Revoked, expired, or already exchanged sessions must not be reactivated.
      operationId: revokeAndroidEnrollmentSession
      tags:
        - Android Provisioning
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      parameters:
        - name: session
          in: path
          required: true
          description: Android enrollment session UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AndroidEnrollmentSessionRevokeRequest'
      responses:
        '200':
          description: Android enrollment session revoked successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AndroidEnrollmentSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /android/bootstrap/exchange:
    post:
      summary: Exchange Android Bootstrap Token
      description: |
        Public bootstrap endpoint for the managed Android app after Device Owner provisioning hands control to SecPal.

        The Android client presents the short-lived bootstrap token from the private QR payload exactly once and receives tenant-scoped bootstrap configuration, including managed policy flags and the release-metadata URL for its configured non-Play channel.
      operationId: exchangeAndroidBootstrapToken
      tags:
        - Android Provisioning
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AndroidBootstrapExchangeRequest'
      responses:
        '200':
          description: Bootstrap token exchanged successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AndroidBootstrapExchangeResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /android/channels/{channel}/latest.json:
    get:
      summary: Get Latest Android Release Metadata
      description: |
        Returns the stable latest release metadata contract for a non-Play Android distribution channel.

        Play Store updates remain store-native and are intentionally not represented by this endpoint.
      operationId: getLatestAndroidReleaseMetadata
      tags:
        - Android Provisioning
      security: []
      parameters:
        - name: channel
          in: path
          required: true
          description: Non-Play Android release channel.
          schema:
            $ref: '#/components/schemas/AndroidReleaseChannel'
      responses:
        '200':
          description: Latest Android release metadata returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AndroidLatestReleaseMetadataResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /android/releases/{version}/metadata.json:
    get:
      summary: Get Versioned Android Release Metadata
      description: |
        Returns the stable versioned release metadata contract for one Android release identifier.

        The endpoint shape is fixed before public APK hosting is wired, so clients and release automation can target one canonical URL model on apk.secpal.app.
      operationId: getVersionedAndroidReleaseMetadata
      tags:
        - Android Provisioning
      security: []
      parameters:
        - name: version
          in: path
          required: true
          description: Version identifier for one Android release.
          schema:
            type: string
            maxLength: 50
      responses:
        '200':
          description: Versioned Android release metadata returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AndroidVersionedReleaseMetadataResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
