  # =============================================================================
  # Employee Management
  # =============================================================================

  /employees:
    get:
      summary: List Employees
      description: Get paginated list of all employees in the tenant. Results can be filtered by the official employee lifecycle status as defined in the `EmployeeStatus` schema.
      operationId: listEmployees
      tags:
        - Employees
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          required: false
          description: Number of items per page (max 100)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
        - name: status
          in: query
          required: false
          description: Filter employees by the official lifecycle status.
          schema:
            $ref: '#/components/schemas/EmployeeStatus'
        - name: search
          in: query
          required: false
          description: Search employees by email and employee_number.
          schema:
            type: string
            maxLength: 255
        - name: legal_entity_id
          in: query
          required: false
          description: Filter employees by Legal Entity.
          schema:
            type: string
            format: uuid
        - name: establishment_id
          in: query
          required: false
          description: Filter employees by establishment.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of employees
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeCollectionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create Employee
      description: |
        Create a new employee record. Onboarding invitations may only be requested during the `pre_contract` phase.
        Requires `employee.write` or `employee.create`. The supplied Legal Entity and establishment must be same tenant and belong to the same Legal Entity, both targets must be active and non-deleted, and the caller must have organizational write access for them.
        Duplicate identification is evaluated atomically in the same transaction as creation. Every duplicate case returns the neutral `DuplicateConflict` response without disclosing which identifying field matched.
      operationId: createEmployee
      tags:
        - Employees
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeCreateRequest'
      responses:
        '201':
          description: Employee created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/DuplicateConflict'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /employees/{employee}:
    get:
      summary: Get Employee
      description: Get a single employee by UUID
      operationId: getEmployee
      tags:
        - Employees
      security:
        - BearerAuth: []
      parameters:
        - name: employee
          in: path
          required: true
          description: Employee UUID identifier
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Employee details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Update Employee
      description: Requires `employee.write` or `employee.update` and updates employee details with partial-update semantics. If either domain relationship is supplied, the resulting stored Legal Entity and establishment pair must remain same tenant and same Legal Entity, use active, non-deleted targets, and remain within the caller's organizational write access.
      operationId: updateEmployee
      tags:
        - Employees
      security:
        - BearerAuth: []
      parameters:
        - name: employee
          in: path
          required: true
          description: Employee UUID identifier
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmployeeUpdateRequest'
      responses:
        '200':
          description: Employee updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete Employee
      description: Soft delete an employee record
      operationId: deleteEmployee
      tags:
        - Employees
      security:
        - BearerAuth: []
      parameters:
        - name: employee
          in: path
          required: true
          description: Employee UUID identifier
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Employee deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # =============================================================================
  # Qualifications & Employee Documents (verified routes — presence guarded)
  # =============================================================================

  /qualifications:
    get:
      summary: List Qualifications
      description: |
        List qualification definitions visible to the tenant (`QualificationController::index`, middleware `tenant.inject`).

        Results include **global system qualifications** (`tenant_id` null, `is_system_qualification` true) plus **tenant custom**
        qualifications (`tenant_id` matches the caller). Rows are ordered by `sort_order`, then `name`.

        **Query filters** (`IndexQualificationRequest`):

        - `is_system_qualification` — when **true**, only global system qualifications; when **false**, only tenant custom rows.
        - `category` — must be one of `QualificationCategory` enum values when provided; omitting the parameter returns all categories.
        - `is_mandatory` — filter by mandatory flag.

        **Authorization:** `QualificationPolicy::viewAny` requires `qualification.read`.
      operationId: listQualifications
      tags:
        - Qualifications
      security:
        - BearerAuth: []
      parameters:
        - name: is_system_qualification
          in: query
          required: false
          schema:
            type: boolean
          description: Filter system vs tenant-custom qualifications (boolean coercion per Laravel query parsing).
        - name: category
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/QualificationCategory'
          description: Optional category filter; invalid values yield HTTP **422** validation on `category`.
        - name: is_mandatory
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: Qualifications returned (`data` is a `QualificationResource` collection).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualificationCollectionResponse'
        '401':
          $ref: '#/components/responses/SimpleUnauthorized'
        '403':
          $ref: '#/components/responses/SimpleForbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create Qualification
      description: |
        Create a **custom tenant qualification** (`StoreQualificationRequest`, `QualificationController::store`, `tenant.inject`).

        System qualifications are seeded; this endpoint only creates non-system rows (`is_system_qualification` is always **false** server-side).

        **Authorization:** `qualification.write` via `QualificationPolicy::create`.
      operationId: createQualification
      tags:
        - Qualifications
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreQualificationRequest'
      responses:
        '201':
          description: Qualification created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualificationSingleResponse'
        '401':
          $ref: '#/components/responses/SimpleUnauthorized'
        '403':
          $ref: '#/components/responses/SimpleForbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /qualifications/{qualification}:
    get:
      summary: Get Qualification
      description: |
        Return a single catalog row (`QualificationController::show`).

        **Route binding:** `Qualification` uses tenant-aware binding with an exception for **global system qualifications** (see
        `EnforcesTenantRouteBinding` + `Qualification::routeBindingAllowsGlobalRecords()`). A UUID that is not a valid string,
        or a row outside the allowed tenant / global rule set, yields **404** with `message: Resource not found.` (see `QualificationControllerTest`).

        **Authorization:** `qualification.read` via `QualificationPolicy::view`.
      operationId: getQualification
      tags:
        - Qualifications
      security:
        - BearerAuth: []
      parameters:
        - name: qualification
          in: path
          required: true
          description: Qualification UUID (`qualifications.id`).
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Qualification returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualificationSingleResponse'
        '401':
          $ref: '#/components/responses/SimpleUnauthorized'
        '403':
          $ref: '#/components/responses/SimpleForbidden'
        '404':
          description: Unknown id, invalid UUID, or not visible to the current tenant binding rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
              examples:
                notFound:
                  value:
                    message: Resource not found.
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Update Qualification
      description: |
        Update a custom tenant qualification (`UpdateQualificationRequest`, `QualificationController::update`).

        **System qualifications** cannot be updated: `QualificationPolicy::update` returns **false** (HTTP **403** before the controller body runs).

        **Authorization:** `qualification.write` for non-system rows.
      operationId: updateQualification
      tags:
        - Qualifications
      security:
        - BearerAuth: []
      parameters:
        - name: qualification
          in: path
          required: true
          description: Qualification UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateQualificationRequest'
      responses:
        '200':
          description: Qualification updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QualificationSingleResponse'
        '401':
          $ref: '#/components/responses/SimpleUnauthorized'
        '403':
          $ref: '#/components/responses/SimpleForbidden'
        '404':
          description: Unknown id, invalid UUID, or not visible to the current tenant binding rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
              examples:
                notFound:
                  value:
                    message: Resource not found.
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete Qualification
      description: |
        Soft-delete a custom tenant qualification (`QualificationController::destroy`).

        **System qualifications** cannot be deleted: `QualificationPolicy::delete` rejects them (HTTP **403**).

        **Success:** HTTP **204** with an empty body.

        **Authorization:** `qualification.write` for deletable (non-system) rows.
      operationId: deleteQualification
      tags:
        - Qualifications
      security:
        - BearerAuth: []
      parameters:
        - name: qualification
          in: path
          required: true
          description: Qualification UUID.
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Qualification soft-deleted
        '401':
          $ref: '#/components/responses/SimpleUnauthorized'
        '403':
          $ref: '#/components/responses/SimpleForbidden'
        '404':
          description: Unknown id, invalid UUID, or not visible to the current tenant binding rules.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
              examples:
                notFound:
                  value:
                    message: Resource not found.
        '500':
          $ref: '#/components/responses/InternalServerError'

  /employees/{employee}/qualifications:
    get:
      summary: List Employee Qualifications
      description: |
        List assignment rows for the employee (`EmployeeQualificationController::index`).

        **Relations:** `employee` and `qualification` are eager-loaded; each `data[]` item includes both embeds.

        **Self-service:** the employee may list their own qualification assignments.

        **Authorization boundary:** OU scopes do not grant access to domain employees. Non-self callers with any organizational scopes
        (`User::organizationalScopes`) receive HTTP **403** with “No organizational entitlement exists for this employee.” Unscoped non-self callers still require the permission below.

        **Authorization:** `employee_qualification.read` via `EmployeeQualificationPolicy::viewAny`.
      operationId: listEmployeeQualifications
      tags:
        - Employees
      security:
        - BearerAuth: []
      parameters:
        - name: employee
          in: path
          required: true
          description: Employee UUID (`employees.id`), tenant-scoped implicit binding.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Assignments returned (`EmployeeQualificationCollectionResponse`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeQualificationCollectionResponse'
        '401':
          $ref: '#/components/responses/SimpleUnauthorized'
        '403':
          $ref: '#/components/responses/SimpleForbidden'
        '404':
          description: Unknown employee id or out-of-scope implicit binding (**404** `Resource not found.`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
              examples:
                notFound:
                  value:
                    message: Resource not found.
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Attach Qualification to Employee
      description: |
        Create an `EmployeeQualification` pivot (`AttachQualificationRequest`, `EmployeeQualificationController::store`).

        **Conflict:** attaching the same `qualification_id` twice for one employee yields HTTP **409** with a message-only JSON body.

        **Authorization boundary:** OU scopes do not grant access to domain employees. Callers with any organizational scopes receive HTTP **403**; unscoped callers require `employee_qualification.write`.
      operationId: attachEmployeeQualification
      tags:
        - Employees
      security:
        - BearerAuth: []
      parameters:
        - name: employee
          in: path
          required: true
          description: Employee UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachQualificationRequest'
      responses:
        '201':
          description: Assignment created (`EmployeeQualificationSingleResponse`; `qualification` relation loaded).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeQualificationSingleResponse'
        '401':
          $ref: '#/components/responses/SimpleUnauthorized'
        '403':
          $ref: '#/components/responses/SimpleForbidden'
        '404':
          description: Employee not found for tenant binding.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
              examples:
                notFound:
                  value:
                    message: Resource not found.
        '409':
          description: Same qualification already attached (`EmployeeQualificationController::store`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
              examples:
                duplicate:
                  value:
                    message: Qualification is already attached to this employee
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /employee-qualifications/{employeeQualification}:
    get:
      summary: Get Employee Qualification Assignment
      description: |
        Return a single pivot row (`EmployeeQualificationController::show`).

        **Route binding:** `EmployeeQualification` is tenant-scoped via its employee (`TenantScopedRouteBindingTest`). Unknown UUID / wrong tenant → **404**
        `Resource not found.`

        **Self-service:** the employee may view their own assignment.

        **Authorization boundary:** OU scopes do not grant access to domain employees. Non-self callers with any organizational scopes receive HTTP **403**; unscoped non-self callers require `employee_qualification.read` through `EmployeeQualificationPolicy::view`.
      operationId: getEmployeeQualification
      tags:
        - Qualifications
      security:
        - BearerAuth: []
      parameters:
        - name: employeeQualification
          in: path
          required: true
          description: Employee qualification pivot UUID (`employee_qualifications.id`).
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Assignment returned (`EmployeeQualificationSingleResponse` with `employee` and `qualification` loaded).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeQualificationSingleResponse'
        '401':
          $ref: '#/components/responses/SimpleUnauthorized'
        '403':
          $ref: '#/components/responses/SimpleForbidden'
        '404':
          description: Invalid UUID format or pivot outside tenant binding (`EmployeeQualificationControllerTest`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
              examples:
                notFound:
                  value:
                    message: Resource not found.
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Update Employee Qualification Assignment
      description: |
        PATCH certificate fields / status (`UpdateEmployeeQualificationRequest`, `EmployeeQualificationController::update`).

        Response reloads `qualification`; `employee` is not guaranteed on success payloads.

        **Authorization boundary:** OU scopes do not grant access to domain employees. Callers with any organizational scopes receive HTTP **403**; unscoped callers require `employee_qualification.write` through `EmployeeQualificationPolicy::update`.
      operationId: updateEmployeeQualification
      tags:
        - Qualifications
      security:
        - BearerAuth: []
      parameters:
        - name: employeeQualification
          in: path
          required: true
          description: Employee qualification pivot UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmployeeQualificationRequest'
      responses:
        '200':
          description: Updated (`EmployeeQualificationSingleResponse`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeQualificationSingleResponse'
        '401':
          $ref: '#/components/responses/SimpleUnauthorized'
        '403':
          $ref: '#/components/responses/SimpleForbidden'
        '404':
          description: Unknown pivot id or binding failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
              examples:
                notFound:
                  value:
                    message: Resource not found.
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Remove Employee Qualification Assignment
      description: |
        Hard-delete the pivot (`EmployeeQualificationController::destroy`). Success is HTTP **204** with an empty body.

        **Authorization boundary:** OU scopes do not grant access to domain employees. Callers with any organizational scopes receive HTTP **403**; unscoped callers require `employee_qualification.write` through `EmployeeQualificationPolicy::delete`.
      operationId: deleteEmployeeQualification
      tags:
        - Qualifications
      security:
        - BearerAuth: []
      parameters:
        - name: employeeQualification
          in: path
          required: true
          description: Employee qualification pivot UUID.
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Pivot removed
        '401':
          $ref: '#/components/responses/SimpleUnauthorized'
        '403':
          $ref: '#/components/responses/SimpleForbidden'
        '404':
          description: Unknown pivot id or binding failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimpleMessageResponse'
              examples:
                notFound:
                  value:
                    message: Resource not found.
        '500':
          $ref: '#/components/responses/InternalServerError'

  /employees/{employee}/documents:
    get:
      summary: List Employee Documents
      description: |
        Returns metadata for documents belonging to the employee (`EmployeeDocumentPolicy::viewAny`).

        **Self-service:** when the authenticated user is the employee (`User` matches `employee.user_id`), the list is filtered to rows with `visible_to_employee` **true**.

        **Authorization boundary:** OU scopes do not grant access to domain employees. Non-self callers with any organizational scopes receive HTTP **403**; unscoped non-self callers require `employee_document.read`.

        **Routing:** Lives under the authenticated `verified` middleware group alongside other `/v1` HR APIs; callers need a verified email address when that middleware applies.
      operationId: listEmployeeDocuments
      tags:
        - Employees
      security:
        - BearerAuth: []
      parameters:
        - name: employee
          in: path
          required: true
          description: Employee UUID identifier
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Documents returned (`data` includes `uploader` where loaded).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeDocumentCollectionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Upload Employee Document
      description: |
        Multipart upload validated by `UploadEmployeeDocumentRequest` (`EmployeeDocumentController::store`).

        Files are encrypted at rest; responses mirror `EmployeeDocumentResource` and never expose `file_path`.

        **Authorization boundary:** OU scopes do not grant access to domain employees. Callers with any organizational scopes receive HTTP **403**; unscoped callers require `employee_document.write` through `EmployeeDocumentPolicy::create`.
      operationId: createEmployeeDocument
      tags:
        - Employees
      security:
        - BearerAuth: []
      parameters:
        - name: employee
          in: path
          required: true
          description: Employee UUID identifier
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/UploadEmployeeDocumentRequest'
            encoding:
              file:
                contentType: application/pdf, image/jpeg, image/png
              title:
                contentType: text/plain
              description:
                contentType: text/plain
              document_type:
                contentType: text/plain
              expiry_date:
                contentType: text/plain
              visible_to_employee:
                contentType: text/plain
      responses:
        '201':
          description: Document stored and metadata returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeDocumentSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /employees/{employee}/documents/{document}:
    get:
      summary: Get Employee Document Metadata
      description: |
        Returns a single document row (`EmployeeDocumentPolicy::view`). Route-model binding is scoped: a `{document}` UUID that does not belong to `{employee}` yields **404**.

        **Self-service:** the employee may view their own document only when `visible_to_employee` is **true**.

        **Authorization boundary:** OU scopes do not grant access to domain employees. Non-self callers with any organizational scopes receive HTTP **403**; unscoped non-self callers require `employee_document.read`.
      operationId: getEmployeeDocument
      tags:
        - Employees
      security:
        - BearerAuth: []
      parameters:
        - name: employee
          in: path
          required: true
          description: Employee UUID identifier
          schema:
            type: string
            format: uuid
        - name: document
          in: path
          required: true
          description: Employee document UUID (`employee_documents.id`)
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeDocumentSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete Employee Document
      description: |
        Soft-deletes the record and removes ciphertext from storage (`EmployeeDocumentPolicy::delete`).

        **Authorization boundary:** OU scopes do not grant access to domain employees. Callers with any organizational scopes receive HTTP **403**; unscoped callers require `employee_document.write`.
      operationId: deleteEmployeeDocument
      tags:
        - Employees
      security:
        - BearerAuth: []
      parameters:
        - name: employee
          in: path
          required: true
          description: Employee UUID identifier
          schema:
            type: string
            format: uuid
        - name: document
          in: path
          required: true
          description: Employee document UUID
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted (empty body)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /employees/{employee}/documents/{document}/download:
    get:
      summary: Download Employee Document File
      description: |
        Streams decrypted bytes with `Content-Type` set to the stored MIME type and `Content-Disposition: attachment` using a sanitized filename.

        **Self-service:** the employee may download their own document only when `visible_to_employee` is **true**.

        **Authorization boundary:** OU scopes do not grant access to domain employees. Non-self callers with any organizational scopes receive HTTP **403**; unscoped non-self callers require `employee_document.read`.

        **404:** Returned when the ciphertext blob is missing from disk (`EmployeeDocumentFileNotFoundException` maps to *File not found*) — see feature tests.

        **500:** Returned when ciphertext exists but cannot be decrypted or parsed (invalid envelope). Covered by `EmployeeDocumentControllerTest` (`returns 500 when encrypted document blob is invalid`).
      operationId: downloadEmployeeDocument
      tags:
        - Employees
      security:
        - BearerAuth: []
      parameters:
        - name: employee
          in: path
          required: true
          description: Employee UUID identifier
          schema:
            type: string
            format: uuid
        - name: document
          in: path
          required: true
          description: Employee document UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: |
            Binary document body. Typical `Content-Type` values include `application/pdf`, `image/jpeg`, or `image/png`.
          headers:
            Content-Type:
              schema:
                type: string
              description: Mirrors the stored MIME type on the document row.
            Content-Disposition:
              schema:
                type: string
              description: Attachment disposition with sanitized filename.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            application/pdf:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # =============================================================================
  # Organizational Unit Endpoints
  # =============================================================================

  /organizational-units:
    get:
      summary: List Organizational Units
      description: |
        Retrieve a paginated, tenant-isolated list of organizational units visible to the authenticated caller.

        **Authorization and isolation:** The route requires Sanctum authentication, the `api-access` token ability, verified email middleware, and the API's tenant injection. `OrganizationalUnitPolicy::viewAny` requires at least one organizational scope. The query is additionally constrained to the active tenant.

        **Need-to-know filtering:** Results are limited to units returned by the caller's organizational scopes. Parent data is filtered independently; when a parent exists but is outside the caller's accessible tree, `parent` is returned as `null`. `meta.root_unit_ids` contains roots of the caller's accessible tree, not necessarily global tenant roots.

        **Status flags:** `is_legal_entity`, `is_establishment`, `is_active`, and `is_assignable` are required booleans on each response item. `is_active` and `is_assignable` are independent: neither is inferred from the other, hierarchy, soft deletion, parent status, or unit type.
      operationId: listOrganizationalUnits
      tags:
        - Organizational Units
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number.
        - name: per_page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 15
          description: Items per page.
        - name: type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OrganizationalUnitType'
          description: Filter by structural type.
        - name: parent_id
          in: query
          required: false
          description: Filter by accessible parent UUID. Use the literal query-string value `null` (`parent_id=null`) to list roots of the caller's accessible tree.
          schema:
            anyOf:
              - type: string
                const: 'null'
              - type: string
                format: uuid
        - name: is_active
          in: query
          required: false
          allowEmptyValue: true
          schema:
            type: boolean
          description: Filter by independent administrative status. Omitted or empty values do not apply the filter. Non-empty query-string values may be `1` or `true` for `true`, and `0` or `false` for `false`. No other non-empty values are accepted.
          x-wire-examples:
            active:
              summary: Filter for active units.
              value: '1'
            inactive:
              summary: Filter for inactive units.
              value: '0'
            active_text:
              summary: Filter for active units with textual encoding.
              value: 'true'
            inactive_text:
              summary: Filter for inactive units with textual encoding.
              value: 'false'
        - name: is_assignable
          in: query
          required: false
          allowEmptyValue: true
          schema:
            type: boolean
          description: Filter by independent eligibility for new operational assignments, scopes, and related workflows. Omitted or empty values do not apply the filter. Non-empty query-string values may be `1` or `true` for `true`, and `0` or `false` for `false`. No other non-empty values are accepted.
          x-wire-examples:
            assignable:
              summary: Filter for assignable units.
              value: '1'
            unassignable:
              summary: Filter for unassignable units.
              value: '0'
            assignable_text:
              summary: Filter for assignable units with textual encoding.
              value: 'true'
            unassignable_text:
              summary: Filter for unassignable units with textual encoding.
              value: 'false'
      responses:
        '200':
          description: Organizational units retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationalUnitCollectionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      summary: Create Organizational Unit
      description: |
        Create a same-tenant organizational unit as either a root unit or a child below `parent_id`.

        **Authorization and policies:** Creating a root unit requires `OrganizationalUnitPolicy::createRoot` (an existing manage-capable scope). Creating a child requires `OrganizationalUnitPolicy::create` on the selected parent. The parent lookup is tenant-scoped and excludes soft-deleted units.

        **Type hierarchy:** Child `type` rank must be lower than the parent rank (`holding` -> `company` -> `region` -> `branch` -> `division` -> `department` -> `custom`). Same-level nesting is rejected with `422`.

        **Status flags:** `is_legal_entity`, `is_establishment`, `is_active`, and `is_assignable` are optional request booleans. Missing `is_legal_entity` and `is_establishment` values are documented as `false`; missing `is_active` and `is_assignable` values are documented as `true`. The status flags are independent; in particular, neither `is_active` nor `is_assignable` is derived from the other, hierarchy, soft deletion, parent status, or unit type.
      operationId: createOrganizationalUnit
      tags:
        - Organizational Units
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationalUnitCreateRequest'
      responses:
        '201':
          description: Organizational unit created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationalUnitSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /organizational-units/{organizational_unit}:
    get:
      summary: Get Organizational Unit
      description: |
        Retrieve one same-tenant organizational unit.

        `OrganizationalUnitPolicy::view` enforces tenant isolation first, then read access through direct or inherited organizational scopes. Parent data remains need-to-know-filtered in the response.
      operationId: getOrganizationalUnit
      tags:
        - Organizational Units
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: organizational_unit
          in: path
          required: true
          description: Organizational unit UUID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Organizational unit retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationalUnitSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      summary: Update Organizational Unit
      description: |
        Update organizational-unit fields with PATCH semantics.

        `OrganizationalUnitPolicy::update` enforces same-tenant access plus write scope. If `type` is changed, the API validates the structural type enum; changing it to `custom` requires a `custom_type_name` containing a non-whitespace character in the same payload. The API returns `422` if the name is absent, `null`, empty, or whitespace-only when changing to `custom`, or if a caller clears the name of an existing custom unit. Status flags remain independent and are never inferred from `type`.

      operationId: updateOrganizationalUnit
      tags:
        - Organizational Units
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      parameters:
        - name: organizational_unit
          in: path
          required: true
          description: Organizational unit UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationalUnitUpdateRequest'
      responses:
        '200':
          description: Organizational unit updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationalUnitSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Delete Organizational Unit
      description: |
        Soft-delete an organizational unit.

        `OrganizationalUnitPolicy::delete` requires same-tenant manage access. The API rejects deletion while non-deleted direct child units exist, regardless of each child's `is_active` value; callers must move or delete children first.
      operationId: deleteOrganizationalUnit
      tags:
        - Organizational Units
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      parameters:
        - name: organizational_unit
          in: path
          required: true
          description: Organizational unit UUID.
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Organizational unit deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/OrganizationalUnitHasChildrenConflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /organizational-units/{organizational_unit}/descendants:
    get:
      summary: List Organizational Unit Descendants
      description: |
        Return descendants of one same-tenant organizational unit.

        The base unit is authorized with `OrganizationalUnitPolicy::view`. Descendant rows belong to the same tenant through the closure-table hierarchy and use the reusable OU schema, including required independent `is_legal_entity`, `is_establishment`, `is_active`, and `is_assignable` flags.
      operationId: listOrganizationalUnitDescendants
      tags:
        - Organizational Units
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: organizational_unit
          in: path
          required: true
          description: Organizational unit UUID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Descendants retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationalUnitHierarchyCollectionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /organizational-units/{organizational_unit}/ancestors:
    get:
      summary: List Organizational Unit Ancestors
      description: |
        Return ancestors of one same-tenant organizational unit, ordered by closure-table depth with the closest parent first.

        The base unit is authorized with `OrganizationalUnitPolicy::view`. Ancestor responses use the same reusable OU schema and therefore include required, non-null `is_legal_entity`, `is_establishment`, `is_active`, and `is_assignable` flags.
      operationId: listOrganizationalUnitAncestors
      tags:
        - Organizational Units
      security:
        - BearerAuth: []
        - SessionAuth: []
      parameters:
        - name: organizational_unit
          in: path
          required: true
          description: Organizational unit UUID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ancestors retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationalUnitHierarchyCollectionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /organizational-units/{organizational_unit}/parent:
    post:
      summary: Attach Organizational Unit Parent
      description: |
        Attach or replace the direct parent of an organizational unit.

        The child requires `OrganizationalUnitPolicy::update`; the selected same-tenant, non-deleted parent also requires `OrganizationalUnitPolicy::create` because reparenting creates a child under that parent. The reparent operation updates closure-table hierarchy and preserves tenant isolation.
      operationId: attachOrganizationalUnitParent
      tags:
        - Organizational Units
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      parameters:
        - name: organizational_unit
          in: path
          required: true
          description: Organizational unit UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationalUnitAttachParentRequest'
      responses:
        '200':
          description: Parent attached successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationalUnitSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /organizational-units/{organizational_unit}/parent/{parent}:
    delete:
      summary: Detach Organizational Unit Parent
      description: |
        Detach a parent relationship and make the organizational unit a root unit.

        `OrganizationalUnitPolicy::update` must pass for the child. The API also verifies the caller keeps direct access to the child after detaching; if access would only have been inherited from the parent, the operation returns `403` instead of allowing accidental self-lockout.
      operationId: detachOrganizationalUnitParent
      tags:
        - Organizational Units
      security:
        - BearerAuth: []
        - SessionAuth: []
          CsrfToken: []
      parameters:
        - name: organizational_unit
          in: path
          required: true
          description: Child organizational unit UUID.
          schema:
            type: string
            format: uuid
        - name: parent
          in: path
          required: true
          description: Current parent organizational unit UUID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Parent detached successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationalUnitSingleResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # =============================================================================
